name: Daily CVE Update
on:
  schedule:
    # Run daily at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-cve-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run CVE collection script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: |
          python src/main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add only the docs directory which contains our reports
          git add docs/

          # Check if there are changes to commit
          if [[ -n $(git status --porcelain docs/) ]]; then
            git commit -m "Daily CVE update - $(date +'%Y-%m-%d')" -m "Updated security reports in docs/"

            # Configure git to use the GITHUB_TOKEN for pushing
            git -c http.extraheader="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit in docs/ directory"
          fi